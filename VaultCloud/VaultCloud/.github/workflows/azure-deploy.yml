name: Azure Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  BACKEND_IMAGE_NAME: vaultcloud-backend
  FRONTEND_IMAGE_NAME: vaultcloud-frontend
  BACKEND_WEBAPP_NAME: ${{ secrets.AZURE_BACKEND_WEBAPP_NAME }}
  FRONTEND_WEBAPP_NAME: ${{ secrets.AZURE_FRONTEND_WEBAPP_NAME }}
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}

jobs:
  deploy:
    name: Build, Push, and Deploy to Azure
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      id-token: write
      contents: read
    environment: production
    concurrency:
      group: azure-production-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Validate required secrets
        run: |
          set -e
          test -n "${{ secrets.AZURE_CREDENTIALS }}"
          test -n "${{ secrets.ACR_NAME }}"
          test -n "${{ secrets.ACR_LOGIN_SERVER }}"
          test -n "${{ secrets.ACR_USERNAME }}"
          test -n "${{ secrets.ACR_PASSWORD }}"
          test -n "${{ secrets.AZURE_RESOURCE_GROUP }}"
          test -n "${{ secrets.AZURE_BACKEND_WEBAPP_NAME }}"
          test -n "${{ secrets.AZURE_FRONTEND_WEBAPP_NAME }}"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE_NAME }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL_PROD }}
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE_NAME }}:latest

      - name: Configure backend web app container
        run: |
          az webapp config container set \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.BACKEND_WEBAPP_NAME }}" \
            --container-image-name "${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}" \
            --container-registry-url "https://${{ env.ACR_LOGIN_SERVER }}" \
            --container-registry-user "${{ secrets.ACR_USERNAME }}" \
            --container-registry-password "${{ secrets.ACR_PASSWORD }}"

          az webapp config appsettings set \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.BACKEND_WEBAPP_NAME }}" \
            --settings WEBSITES_PORT=8080

      - name: Configure frontend web app container
        run: |
          az webapp config container set \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.FRONTEND_WEBAPP_NAME }}" \
            --container-image-name "${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}" \
            --container-registry-url "https://${{ env.ACR_LOGIN_SERVER }}" \
            --container-registry-user "${{ secrets.ACR_USERNAME }}" \
            --container-registry-password "${{ secrets.ACR_PASSWORD }}"

          az webapp config appsettings set \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.FRONTEND_WEBAPP_NAME }}" \
            --settings WEBSITES_PORT=80

      - name: Restart web apps
        run: |
          az webapp restart --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --name "${{ env.BACKEND_WEBAPP_NAME }}"
          az webapp restart --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --name "${{ env.FRONTEND_WEBAPP_NAME }}"
